<!DOCTYPE html>
<html lang="uk">

<head>
<meta charset="UTF-8">
<title>Менеджер заявок на доступ до лабораторії</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Менеджер заявок на доступ до лабораторії</h1>

<div class="container">

<form id="createForm">

<label for="userName">User Name</label>
<input type="text" id="userName">

<label for="date">Дата доступу</label>
<input type="date" id="date">

<label for="accessType">Тип доступу</label>
<select id="accessType">
<option value="">Оберіть</option>
<option value="student">Student</option>
<option value="teacher">Teacher</option>
<option value="guest">Guest</option>
</select>

<label for="comments">Коментар</label>
<textarea id="comments"></textarea>

<label for="status">Статус</label>
<select id="status">
<option value="Pending" selected>Pending</option>
<option value="Approved">Approved</option>
<option value="Rejected">Rejected</option>
</select>

<div id="errorBox" class="error-text"></div>

<button type="submit">Додати заявку</button>
<button type="reset">Очистити</button>

</form>

<div>

<h2>Список заявок</h2>

<table>

<thead>
<tr>
<th>#</th>
<th>User</th>
<th>Date</th>
<th>Access Type</th>
<th>Comments</th>
<th>Status</th>
<th>Дії</th>
</tr>
</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

</div>

<script src="app.js" defer></script>

</body>
</html>
