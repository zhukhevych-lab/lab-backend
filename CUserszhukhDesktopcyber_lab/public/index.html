<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Cyber Lab Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; padding: 40px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h1 { color: #00ff88; text-shadow: 0 0 10px rgba(0,255,136,0.3); }
        input { background: #2d2d2d; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; width: 250px; margin-right: 10px; }
        button { background: #00ff88; color: #000; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #00cc6e; }
        ul { list-style: none; padding: 0; }
        li { background: #262626; margin: 5px 0; padding: 10px; border-radius: 5px; border-left: 4px solid #00ff88; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ Cybersecurity Lab API</h1>
        
        <div class="card">
            <h3>Реєстрація користувача</h3>
            <input type="text" id="username" placeholder="Нікнейм">
            <input type="email" id="email" placeholder="Email">
            <button onclick="addUser()">Зареєструвати</button>
        </div>

        <div class="card">
            <h3>Активні користувачі</h3>
            <button onclick="loadUsers()">Оновити список</button>
            <ul id="userList"></ul>
        </div>
    </div>

    <script>
        async function loadUsers() {
            const res = await fetch('/api/users');
            const users = await res.json();
            const list = document.getElementById('userList');
            list.innerHTML = users.map(u => `<li><strong>${u.username}</strong> — ${u.email} <br><small>ID: ${u.id}</small></li>`).join('');
        }

        async function addUser() {
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            if(!username || !email) return alert('Заповніть усі поля!');

            await fetch('/api/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, role: 'user' })
            });
            
            document.getElementById('username').value = '';
            document.getElementById('email').value = '';
            loadUsers();
        }
        loadUsers(); // завантажити відразу
    </script>
</body>
</html>
