<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Менеджер заявок на доступ до лабораторії</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Менеджер заявок на доступ до лабораторії</h1>

<div class="container">
    <form id="createForm">
        <label for="userName">User Name</label>
        <input type="text" id="userName">

        <label for="date">Дата доступу</label>
        <input type="date" id="date">

        <label for="accessType">Тип доступу</label>
        <select id="accessType">
            <option value="">Оберіть</option>
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
            <option value="guest">Guest</option>
        </select>

        <label for="comments">Коментар</label>
        <textarea id="comments"></textarea>

        <label for="status">Статус</label>
        <select id="status">
            <option value="Pending" selected>Pending</option>
            <option value="Approved">Approved</option>
            <option value="Rejected">Rejected</option>
        </select>

        <div id="errorBox" class="error-text"></div>

        <button type="submit">Зберегти заявку</button>
        <button type="reset">Очистити</button>
    </form>

    <div class="table-container">
        <h2>Список заявок</h2>

        <div class="filters-panel">
            <input type="text" id="searchInput" placeholder="Пошук за ім'ям...">
            
            <select id="statusFilter">
                <option value="all">Усі статуси</option>
                <option value="Pending">Pending</option>
                <option value="Approved">Approved</option>
                <option value="Rejected">Rejected</option>
            </select>

            <select id="sortOrder">
                <option value="desc">Спочатку нові</option>
                <option value="asc">Спочатку старі</option>
            </select>
        </div>

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>User</th>
                    <th>Date</th>
                    <th>Access Type</th>
                    <th>Comments</th>
                    <th>Status</th>
                    <th>Дії</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script src="app.js" defer></script>
</body>
</html>
